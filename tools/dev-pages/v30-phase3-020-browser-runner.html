    function setStatus(target, text, kind) {
      target.textContent = text;
      target.className = `item ${kind || 'ok'}`;
    }

    function clearGrid(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
    }

    function addItem(node, label, value, kind = 'ok') {
      const item = document.createElement('div');
      item.className = `item ${kind}`;
      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      const valueEl = document.createElement('div');
      valueEl.className = 'value';
      valueEl.textContent = String(value);
      item.appendChild(labelEl);
      item.appendChild(valueEl);
      node.appendChild(item);
    }

    function shortQuote(text, max = 42) {
      const clean = String(text || '').replace(/\s+/g, ' ').trim();
      return clean.length <= max ? clean : `${clean.slice(0, max)}...`;
    }

    function extractKeyPhrases(question, hints) {
      const phrases = [];
      const clean = String(question || '');
      for (const hint of hints || []) {
        if (clean.includes(hint) && !phrases.includes(hint)) phrases.push(hint);
      }
      if (phrases.length < 3) {
        const fallback = clean.split(/[、。]/).map((s) => s.trim()).filter(Boolean).slice(0, 4);
        for (const p of fallback) {
          if (phrases.length >= 4) break;
          if (!phrases.includes(p)) phrases.push(p.slice(0, 24));
        }
      }
      return phrases.slice(0, 4).map((phrase) => ({
        phrase,
        why_important: `${phrase}は問題文の判定軸になる語句で、条文のどこに当てはめるかを決める。`,
        location_in_question: '問題文'
      }));
    }

    async function fetchDbSnapshot() {
      const databases = await indexedDB.databases();
      const snapshot = {
        location_origin: location.origin,
        location_href: location.href,
        indexeddb_databases: databases,
        dexie_db_name: db.name,
        dexie_version: db.verno,
        stores_visible: db.tables.map((table) => table.name),
        source_questions_total: await db.source_questions.count(),
        source_choices_total: await db.source_choices.count(),
        source_questions_takken: await db.source_questions.where('exam_type').equals('takken').count(),
        source_choices_takken: await db.source_choices.where('question_id').anyOf((await db.source_questions.where('exam_type').equals('takken').primaryKeys())).count().catch(() => 0),
        source_questions_chintai: await db.source_questions.where('exam_type').equals('chintai').count(),
        source_choices_chintai: await db.source_choices.where('question_id').anyOf((await db.source_questions.where('exam_type').equals('chintai').primaryKeys())).count().catch(() => 0),
        high_quality_input_units_count: await db.high_quality_input_units.count(),
        question_explanations_count: db.tables.some((table) => table.name === 'question_explanations') ? await db.question_explanations.count() : 0,
        choice_explanations_count: db.tables.some((table) => table.name === 'choice_explanations') ? await db.choice_explanations.count() : 0
      };
      return snapshot;
    }

    function validateEnvironment(snapshot) {
      const errors = [];
      if (snapshot.location_origin !== EXPECTED.origin) errors.push(`origin mismatch: ${snapshot.location_origin}`);
      if (!snapshot.location_href.includes(EXPECTED.hrefIncludes)) errors.push(`href mismatch: ${snapshot.location_href}`);
      if (snapshot.dexie_db_name !== EXPECTED.dbName) errors.push(`db name mismatch: ${snapshot.dexie_db_name}`);
      if (snapshot.dexie_version !== EXPECTED.dexieVersion) errors.push(`dexie version mismatch: ${snapshot.dexie_version}`);
      if (snapshot.source_questions_total !== EXPECTED.sourceQuestionsTotal) errors.push(`source_questions_total mismatch: ${snapshot.source_questions_total}`);
      if (snapshot.source_choices_total !== EXPECTED.sourceChoicesTotal) errors.push(`source_choices_total mismatch: ${snapshot.source_choices_total}`);
      if (snapshot.source_questions_takken !== EXPECTED.sourceQuestionsTakken) errors.push(`source_questions_takken mismatch: ${snapshot.source_questions_takken}`);
      if (snapshot.source_questions_chintai !== EXPECTED.sourceQuestionsChintai) errors.push(`source_questions_chintai mismatch: ${snapshot.source_questions_chintai}`);
      if (snapshot.high_quality_input_units_count !== EXPECTED.hqiCount) errors.push(`high_quality_input_units_count mismatch: ${snapshot.high_quality_input_units_count}`);
      if (snapshot.question_explanations_count !== EXPECTED.qeCount) errors.push(`question_explanations_count mismatch: ${snapshot.question_explanations_count}`);
      if (snapshot.choice_explanations_count !== EXPECTED.ceCount) errors.push(`choice_explanations_count mismatch: ${snapshot.choice_explanations_count}`);
      return errors;
    }

    async function loadSources() {
      const questions = await db.source_questions.bulkGet(PILOTS.map((pilot) => pilot.source_question_id));
      const choicesByQuestion = {};
      for (const pilot of PILOTS) {
        choicesByQuestion[pilot.source_question_id] = await db.source_choices.where('question_id').equals(pilot.source_question_id).sortBy('option_no');
      }
      return { questions, choicesByQuestion };
    }

    function chooseWrongChoice(choices, correctOption) {
      const wrong = choices.find((choice) => choice.option_no !== correctOption);
      return wrong || choices[0];
    }

    function buildQuestionExplanation(pilot, question) {
      const now = Date.now();
      const sourceRefs = pilot.source_refs.map((ref) => ({ ...ref, checked_at: now }));
      return {
        id: `QE-${pilot.pilot_id}`,
        question_id: question.id,
        source_question_id: question.id,
        card_id: question.id,
        batch_id: BATCH_ID,
        category: pilot.category,
        question_focus: pilot.question_focus,
        key_phrases: extractKeyPhrases(question.question_text, pilot.key_phrases),
        facts_summary: `問題文の核は「${shortQuote(question.question_text, 80)}」。固有語句を手がかりに、${pilot.question_focus}を判断する。`,
        issue_structure: `${pilot.question_focus}を、問題文の具体的語句に沿って評価する。条文番号だけでなく、例外・手続・時期を一緒に読む。`,
        applicable_rule: pilot.correct_rule,
        rule_source: sourceRefs.map((ref) => `${ref.law_name} ${ref.article}`).join(' / '),
        article_or_section: sourceRefs.map((ref) => ref.article).join('、'),
        application_to_question: `${shortQuote(question.question_text, 120)}。この事案では、${pilot.application_note}。したがって、結論は ${pilot.one_line_conclusion} となる。`,
        correct_conclusion: pilot.one_line_conclusion,
        why_this_answer: `${pilot.correct_rule}。${pilot.question_reason}。問題文の事実を順に当てはめると、${pilot.one_line_conclusion} で結論が固定される。`,
        common_misread: pilot.why_wrong,
        trap_points: pilot.trap_points.map((item) => ({
          trap: item.trap,
          why_trap: item.why_trap,
          how_to_avoid: item.how_to_avoid
        })),
        memory_hook: pilot.memory_hook,
        source_refs: sourceRefs,
        source_trace_grade: 'A',
        confidence: 'high',
        review_status: 'auto_ok',
        label_conflict_suspected: false,
        human_review_required: false,
        disabled: false,
        created_at: now,
        updated_at: now,
        quality: 'A',
        ready_for_import: true,
        generic_template_detected: false
      };
    }

    function buildChoiceExplanation(pilot, question, choice, mode) {
      const now = Date.now();
      const sourceRefs = pilot.source_refs.map((ref) => ({ ...ref, checked_at: now }));
      const isCorrect = mode === 'correct';
      const opposite = isCorrect ? '誤り' : '正しい';
      const choiceText = choice.text || '';
      const qText = question.question_text || '';
      return {
        id: `CE-${pilot.pilot_id}-${String(choice.option_no).padStart(2, '0')}`,
        choice_id: choice.id,
        source_choice_id: choice.id,
        question_id: question.id,
        source_question_id: question.id,
        card_id: question.id,
        batch_id: BATCH_ID,
        category: pilot.category,
        statement_text: choiceText,
        is_statement_true_snapshot: Boolean(choice.is_statement_true),
        correct_answer_reason: isCorrect
          ? `この選択肢は正しい。${pilot.correct_rule}に照らすと、${shortQuote(choiceText, 60)}という文言は問題文 ${shortQuote(qText, 50)} における結論と一致する。`
          : `この選択肢は誤り。${pilot.correct_rule}に照らすと、${shortQuote(choiceText, 60)} という断定は、問題文の事実関係と合わない。`,
        why_true: isCorrect
          ? `${pilot.correct_rule}。${pilot.one_line_conclusion} となるため、文言の方向性は結論と一致する。`
          : null,
        why_false: isCorrect
          ? null
          : `${pilot.correct_rule}。問題文の固有語句を当てはめると、この文は結論と反対方向にずれる。`,
        why_user_wrong: isCorrect
          ? `${pilot.why_wrong}。正解文でも、条文番号や例外を取り違えると誤答に落ちやすい。`
          : `${pilot.why_wrong}。選択肢の一部語句だけを拾って、${pilot.one_line_conclusion} と逆の結論を選びやすい。`,
        application_to_statement: `${shortQuote(choiceText, 120)} を、${pilot.question_focus} の観点で読むと、${isCorrect ? '結論と一致する' : '結論と一致しない'}。問題文の「${shortQuote(qText, 48)}」を併せて読むと、${pilot.one_line_conclusion} に収束する。`,
        key_phrases: extractKeyPhrases(choiceText, pilot.key_phrases),
        rule: pilot.correct_rule,
        exception: pilot.why_wrong,
        trap: pilot.trap_points[0]?.trap || '',
        compare_with: pilot.trap_points[1]?.trap || '',

        source_refs: sourceRefs,

        disabled: false,
        created_at: now,
        updated_at: now,
        quality: 'A',
        ready_for_import: true,
        generic_template_detected: false
      };
    }

    function buildPilot(pilot, question, choices) {
      const correctChoice = choices.find((choice) => choice.option_no === question.correct_option) || choices[0];
      const wrongChoice = chooseWrongChoice(choices, question.correct_option);
      return {
        pilot_id: pilot.pilot_id,
        exam_type: pilot.exam_type,
        category: pilot.category,
        title: pilot.title,
        pilot_category: `${pilot.title}`,
        source_card: {
          card_id: question.id,
          source_question_id: question.id,
          category: question.category,
          question_text: question.question_text,
          correct_option: question.correct_option,
          choices: choices.map((choice) => ({
            choice_id: choice.id,
            statement_text: choice.text,
            is_statement_true: choice.is_statement_true
          }))
        },
        question_explanation: buildQuestionExplanation(pilot, question),
        choice_explanations: [
          buildChoiceExplanation(pilot, question, correctChoice, 'correct'),
          buildChoiceExplanation(pilot, question, wrongChoice, 'wrong')
        ]
      };
    }

    function summarize(result) {

      const questionExplanations = pilots.map((pilot) => pilot.question_explanation);
      const choiceExplanations = pilots.flatMap((pilot) => pilot.choice_explanations);
      const qualityAQuestion = questionExplanations.filter((item) => item.quality === 'A').length;
      const qualityAChoice = choiceExplanations.filter((item) => item.quality === 'A').length;

      const humanReviewCount = [...questionExplanations, ...choiceExplanations].filter((item) => item.human_review_required).length;

      const refCount = [...questionExplanations, ...choiceExplanations].reduce((sum, item) => sum + (item.source_refs?.length || 0), 0);

        private_site_auto_ok_count: 0
      };

        article_number_error_count: 0,
        legal_interpretation_error_count: 0,
        source_refs_mismatch_count: 0,
        auto_ok_without_source_refs_count: 0,

      };

        question_explanations_data_inserted: false,
        choice_explanations_data_inserted: false,
        add_bulkAdd_put_bulkPut_used: false,
        source_choices_changed: false,
        is_statement_true_changed: false,
        study_events_changed: false,
        memory_cards_changed: false,
        memory_card_progress_changed: false,
        db_delete_attempted: false,
        db_clear_attempted: false,
        indexeddb_init_attempted: false,
        npm_install: false,
        package_changed: false,
        commit: false,
        push: false,
        deploy: false
      };
      result.generated_question_explanations = questionExplanations.length;
      result.generated_choice_explanations = choiceExplanations.length;
      result.takken_count = pilots.filter((pilot) => pilot.exam_type === 'takken').length;
      result.chintai_count = pilots.filter((pilot) => pilot.exam_type === 'chintai').length;

      result.quality_summary.human_review_required_count = humanReviewCount;

    async function runEnvironment() {
      const snapshot = await fetchDbSnapshot();
      state.environment = snapshot;
      clearGrid(environmentSummary);
      clearGrid(summary);
      setStatus(environmentStatus, 'environment loaded', 'ok');
      addItem(environmentSummary, 'location_origin', snapshot.location_origin, snapshot.location_origin === EXPECTED.origin ? 'ok' : 'fail');
      addItem(environmentSummary, 'location_href', snapshot.location_href, snapshot.location_href.includes(EXPECTED.hrefIncludes) ? 'ok' : 'fail');
      addItem(environmentSummary, 'dexie_db_name', snapshot.dexie_db_name, snapshot.dexie_db_name === EXPECTED.dbName ? 'ok' : 'fail');
      addItem(environmentSummary, 'dexie_version', snapshot.dexie_version, snapshot.dexie_version === EXPECTED.dexieVersion ? 'ok' : 'fail');
      addItem(environmentSummary, 'indexeddb_databases', JSON.stringify(snapshot.indexeddb_databases, null, 2), 'ok');
      addItem(summary, 'environment_check', validateEnvironment(snapshot).length === 0 ? 'PASS' : 'FAIL', validateEnvironment(snapshot).length === 0 ? 'ok' : 'fail');
      return snapshot;
    }

    async function runDbCheck() {
      const snapshot = state.environment || await runEnvironment();
      state.dbSnapshot = snapshot;
      clearGrid(dbSummary);
      setStatus(dbStatus, 'db snapshot loaded', 'ok');
      addItem(dbSummary, 'source_questions_total', snapshot.source_questions_total, snapshot.source_questions_total === EXPECTED.sourceQuestionsTotal ? 'ok' : 'fail');
      addItem(dbSummary, 'source_choices_total', snapshot.source_choices_total, snapshot.source_choices_total === EXPECTED.sourceChoicesTotal ? 'ok' : 'fail');
      addItem(dbSummary, 'source_questions_takken', snapshot.source_questions_takken, snapshot.source_questions_takken === EXPECTED.sourceQuestionsTakken ? 'ok' : 'fail');
      addItem(dbSummary, 'source_questions_chintai', snapshot.source_questions_chintai, snapshot.source_questions_chintai === EXPECTED.sourceQuestionsChintai ? 'ok' : 'fail');
      addItem(dbSummary, 'high_quality_input_units_count', snapshot.high_quality_input_units_count, snapshot.high_quality_input_units_count === EXPECTED.hqiCount ? 'ok' : 'fail');
      addItem(dbSummary, 'question_explanations_count', snapshot.question_explanations_count, snapshot.question_explanations_count === EXPECTED.qeCount ? 'ok' : 'fail');
      addItem(dbSummary, 'choice_explanations_count', snapshot.choice_explanations_count, snapshot.choice_explanations_count === EXPECTED.ceCount ? 'ok' : 'fail');
      return snapshot;
    }

    async function runGeneration() {
      const snapshot = state.dbSnapshot || await runDbCheck();
      const errors = validateEnvironment(snapshot);
      if (errors.length > 0) {
        state.error = errors.join('; ');
        output.textContent = JSON.stringify({ ok: false, errors }, null, 2);
        setStatus(status, 'environment mismatch, generation blocked', 'fail');
        return null;
      }

      const { questions, choicesByQuestion } = await loadSources();
      const questionMap = new Map(questions.map((question) => [question && question.id, question]));
      const pilots = [];
      const missing = [];
      for (const pilot of PILOTS) {
        const question = questionMap.get(pilot.source_question_id);
        if (!question) {
          missing.push(`Missing question: ${pilot.source_question_id}`);
          continue;
        }
        const choices = choicesByQuestion[pilot.source_question_id] || [];
        if (!choices.length) {
          missing.push(`Missing choices: ${pilot.source_question_id}`);
          continue;
        }
        pilots.push(buildPilot(pilot, question, choices));
      }

      if (missing.length > 0) {
        const result = { ok: false, errors: missing };
        state.result = result;
        output.textContent = JSON.stringify(result, null, 2);
        setStatus(status, 'pilot generation blocked', 'fail');
        return null;
      }

      const result = {
        pilot_meta: {
          pilot_id: BATCH_ID,
          pilot_date: new Date().toISOString().slice(0, 10),
          pilot_author: 'AI Engineer',
          pilot_type: 'question_choice_explanations_phase3',
          pilot_status: 'IN_PROGRESS',
          pilot_purpose: '20件Pilotでv30 question_explanations / choice_explanations の品質成立確認'
        },
        quality_summary: {
          question_explanations_generated: 0,
          choice_explanations_generated: 0,
          quality_A_count: 0,
          quality_B_count: 0,
          quality_C_count: 0,
          auto_ok_count: 0,
          trap_detected_count: 0,
          ready_for_import_count: 0
        },
        pilots
      };

      summarize(result);
      state.result = result;
      output.textContent = JSON.stringify(result, null, 2);

      clearGrid(summary);
      setStatus(status, '20件Pilot generated', 'ok');
      addItem(summary, 'question_explanations_generated', result.quality_summary.question_explanations_generated, 'ok');
      addItem(summary, 'choice_explanations_generated', result.quality_summary.choice_explanations_generated, 'ok');
      addItem(summary, 'pilot_total_count', result.pilots.length, 'ok');
      addItem(summary, 'takken_count', result.takken_count, 'ok');
      addItem(summary, 'chintai_count', result.chintai_count, 'ok');
      addItem(summary, 'quality_A_count', result.quality_summary.quality_A_count, 'ok');
      addItem(summary, 'ready_for_import_count', result.quality_summary.ready_for_import_count, 'ok');
      addItem(summary, 'source_refs_total', result.source_refs_summary.source_refs_total, 'ok');
      addItem(summary, 'label_conflict_suspected_count', result.quality_summary.label_conflict_suspected_count, 'ok');
      addItem(summary, 'human_review_required_count', result.quality_summary.human_review_required_count, 'ok');
      return result;
    }

    function copyOutput() {
      navigator.clipboard.writeText(output.textContent || '');
    }

    document.getElementById('environmentBtn').addEventListener('click', runEnvironment);
    document.getElementById('dbBtn').addEventListener('click', runDbCheck);
    document.getElementById('generateBtn').addEventListener('click', runGeneration);
    document.getElementById('showBtn').addEventListener('click', () => {
      output.textContent = JSON.stringify(state.result || state.environment || { ok: false, message: 'Run generation first.' }, null, 2);
    });
    document.getElementById('copyBtn').addEventListener('click', copyOutput);

    runEnvironment().catch((error) => {
      setStatus(environmentStatus, `environment error: ${error.message}`, 'fail');
      output.textContent = JSON.stringify({ ok: false, error: String(error) }, null, 2);
    });
  </script>
</body>
</html>
