<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>v30 HQI Batch1 5173 Formal Restore Runner</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: linear-gradient(180deg, #f4f7fb 0%, #eef2ff 100%);
      color: #1f2937;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 1240px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 16px;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08);
      padding: 24px;
    }
    h1 {
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 3px solid #2563eb;
      font-size: 24px;
    }
    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .notice {
      margin: 14px 0 18px;
      padding: 12px 14px;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      background: #fff7ed;
    }
    .section {
      margin-top: 18px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #f8fafc;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 16px;
      color: #fff;
      background: #2563eb;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #0f766e; }
    button.neutral { background: #4b5563; }
    button.danger { background: #b91c1c; }
    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      margin-top: 14px;
    }
    .item {
      background: #fff;
      border-left: 4px solid #2563eb;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .item.ok { border-left-color: #16a34a; }
    .item.warn { border-left-color: #f59e0b; }
    .item.fail { border-left-color: #dc2626; }
    .label {
      margin-bottom: 4px;
      color: #52606d;
      font-size: 12px;
    }
    .value {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }
    .approval-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    input[type="text"] {
      min-width: 420px;
      max-width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      font-family: Consolas, "Courier New", monospace;
    }
    pre {
      margin: 0;
      max-height: 520px;
      overflow: auto;
      padding: 14px;
      border-radius: 10px;
      background: #111827;
      color: #e5e7eb;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>v30 HQI Batch1 5173 Formal Restore Runner</h1>

    <div class="notice">
      <strong>Formal Restore専用</strong>
      <div>このページは `high_quality_input_units` のみを書き込み対象とする正式復旧を行います。承認コード一致前は実行できません。</div>
    </div>

    <div class="section">
      <h2>操作</h2>
      <div class="toolbar">
        <button id="environmentDiagnosticsBtn">環境診断</button>
        <button id="checkDbBtn" class="secondary">事前DB確認</button>
        <button id="loadBatch1Btn" class="secondary">Batch1データ読み込み</button>
        <button id="formalImportDryRunBtn">Formal Import dry-run再確認</button>
        <button id="rollbackDryRunBtn" class="secondary">Rollback Dry-run</button>
        <button id="postDbBtn" class="secondary">投入後DB確認</button>
        <button id="showReportBtn" class="neutral">レポートJSON表示</button>
        <button id="copyReportBtn" class="neutral">レポートJSONコピー</button>
      </div>
      <div class="approval-row">
        <input id="approvalCodeInput" type="text" placeholder="APPROVE_HQI_BATCH1_5173_FORMAL_RESTORE" autocomplete="off" spellcheck="false">
        <button id="formalRestoreBtn" class="danger" disabled>HQI Batch1 正式復旧</button>
      </div>
    </div>

    <div class="section">
      <h2>環境診断</h2>
      <div id="environmentStatus"></div>
      <div id="environmentSummary" class="grid"></div>
    </div>

    <div class="section">
      <h2>事前DB確認</h2>
      <div id="dbStatus"></div>
      <div id="dbSummary" class="grid"></div>
    </div>

    <div class="section">
      <h2>Batch1データ確認</h2>
      <div id="batch1Status"></div>
      <div id="batch1Summary" class="grid"></div>
    </div>

    <div class="section">
      <h2>Formal Import dry-run</h2>
      <div id="formalImportDryRunStatus"></div>
      <div id="formalImportSummary" class="grid"></div>
    </div>

    <div class="section">
      <h2>正式復旧</h2>
      <div id="restoreStatus"></div>
      <div id="restoreSummary" class="grid"></div>
    </div>

    <div class="section">
      <h2>投入後DB確認</h2>
      <div id="postDbStatus"></div>
      <div id="postDbSummary" class="grid"></div>
    </div>

    <div class="section">
      <h2>Rollback Dry-run</h2>
      <div id="rollbackStatus"></div>
      <div id="rollbackSummary" class="grid"></div>
    </div>

    <div class="section">
      <h2>レポートJSON</h2>
      <pre id="output">Waiting for execution...</pre>
    </div>
  </main>

  <script type="module">
    import { db } from '/src/db.ts';

    const APPROVAL_CODE = 'APPROVE_HQI_BATCH1_5173_FORMAL_RESTORE';
    const CANONICAL_DB_NAME = 'TakkenOS_DB';
    const EXPECTED_DEXIE_VERSION = 30;
    const BATCH_ID = 'HQI-BATCH1';
    const BATCH1_FETCH_CANDIDATES = [
      '/docs/research/high_quality_input_web_research_batch1.json',
      '/takken-app/docs/research/high_quality_input_web_research_batch1.json'
    ];

    const report = {
      audit_type: 'V30_HQI_BATCH1_5173_FORMAL_RESTORE',
      generated_at: null,
      browser: {},
      indexed_db: {},
      database_before: {},
      batch1: {},
      formal_import_dry_run: {},
      human_gate: {},
      formal_restore: {},
      database_after: {},
      rollback_dry_run_after: {},
      safety: {
        pilot_20_generated: false,
        question_explanations_updated: false,
        choice_explanations_updated: false,
        source_choices_changed: false,
        is_statement_true_changed: false,
        study_events_changed: false,
        memory_cards_changed: false,
        memory_card_progress_changed: false,
        db_delete_attempted: false,
        db_clear_attempted: false,
        indexeddb_init_attempted: false,
        npm_install: false,
        package_changed: false,
        commit: false,
        push: false,
        deploy: false
      }
    };

    const state = {
      indexedDbInfo: null,
      databaseBefore: null,
      batch1Data: null,
      batch1FetchResult: null,
      dryRunResult: null,
      approvalCodeReceived: false,
      formalRestoreResult: null,
      databaseAfter: null,
      rollbackDryRunResult: null
    };

    const output = document.getElementById('output');
    const environmentStatus = document.getElementById('environmentStatus');
    const dbStatus = document.getElementById('dbStatus');
    const batch1Status = document.getElementById('batch1Status');
    const formalImportDryRunStatus = document.getElementById('formalImportDryRunStatus');
    const restoreStatus = document.getElementById('restoreStatus');
    const postDbStatus = document.getElementById('postDbStatus');
    const rollbackStatus = document.getElementById('rollbackStatus');
    const environmentSummary = document.getElementById('environmentSummary');
    const dbSummary = document.getElementById('dbSummary');
    const batch1Summary = document.getElementById('batch1Summary');
    const formalImportSummary = document.getElementById('formalImportSummary');
    const restoreSummary = document.getElementById('restoreSummary');
    const postDbSummary = document.getElementById('postDbSummary');
    const rollbackSummary = document.getElementById('rollbackSummary');
    const approvalCodeInput = document.getElementById('approvalCodeInput');
    const formalRestoreBtn = document.getElementById('formalRestoreBtn');

    const environmentBtn = document.getElementById('environmentDiagnosticsBtn');
    const checkDbBtn = document.getElementById('checkDbBtn');
    const loadBatch1Btn = document.getElementById('loadBatch1Btn');
    const dryRunBtn = document.getElementById('formalImportDryRunBtn');
    const rollbackBtn = document.getElementById('rollbackDryRunBtn');
    const postDbBtn = document.getElementById('postDbBtn');
    const showReportBtn = document.getElementById('showReportBtn');
    const copyReportBtn = document.getElementById('copyReportBtn');

    function clearNode(node) {
      while (node.firstChild) {
        node.removeChild(node.firstChild);
      }
    }

    function setStatus(node, text, kind) {
      clearNode(node);
      const div = document.createElement('div');
      div.className = `item ${kind || ''}`.trim();
      const value = document.createElement('div');
      value.className = 'value';
      value.textContent = text;
      div.appendChild(value);
      node.appendChild(div);
    }

    function addSummary(target, label, value, kind) {
      const item = document.createElement('div');
      item.className = `item ${kind || ''}`.trim();
      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.textContent = label;
      const valueEl = document.createElement('div');
      valueEl.className = 'value';
      valueEl.textContent = String(value);
      item.appendChild(labelEl);
      item.appendChild(valueEl);
      target.appendChild(item);
    }

    function normalizeBatch1Items(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.items)) return data.items;
      if (Array.isArray(data.units)) return data.units;
      if (Array.isArray(data.data)) return data.data;
      return [];
    }

    async function listIndexedDatabases() {
      if (!indexedDB.databases) {
        return { supported: false, databases: [], error: 'indexedDB.databases() unsupported' };
      }
      try {
        const databases = await indexedDB.databases();
        return {
          supported: true,
          databases: databases.map((database) => ({
            name: database.name || '',
            version: database.version || null
          })),
          error: null
        };
      } catch (error) {
        return { supported: true, databases: [], error: error.message };
      }
    }

    async function safeCount(tableName) {
      try {
        return { count: await db.table(tableName).count(), error: null };
      } catch (error) {
        return { count: null, error: error.message };
      }
    }

    async function readDbSnapshot() {
      await db.open();
      const questions = await db.table('source_questions').toArray();
      const choices = await db.table('source_choices').toArray();
      const takkenIds = new Set(questions.filter((item) => item.exam_type === 'takken').map((item) => item.id));
      const chintaiIds = new Set(questions.filter((item) => item.exam_type === 'chintai').map((item) => item.id));

      return {
        dexie_db_name: db.name,
        dexie_version: db.verno,
        stores_visible: db.tables.map((table) => table.name).sort(),
        source_questions_total: questions.length,
        source_choices_total: choices.length,
        source_questions_takken: takkenIds.size,
        source_choices_takken: choices.filter((choice) => takkenIds.has(choice.question_id)).length,
        source_questions_chintai: chintaiIds.size,
        source_choices_chintai: choices.filter((choice) => chintaiIds.has(choice.question_id)).length,
        high_quality_input_units_count: await db.table('high_quality_input_units').count(),
        question_explanations_count: await db.table('question_explanations').count(),
        choice_explanations_count: await db.table('choice_explanations').count()
      };
    }

    async function fetchBatch1() {
      const attempts = [];
      let selected = null;

      for (const url of BATCH1_FETCH_CANDIDATES) {
        const attempt = {
          url,
          status: null,
          ok: false,
          item_count: 0,
          source_trace_grade_A_count: 0,
          human_review_required_false_count: 0,
          error: null
        };

        try {
          const response = await fetch(url, { cache: 'no-store' });
          attempt.status = response.status;
          attempt.ok = response.ok;
          if (!response.ok) {
            attempt.error = response.statusText;
            attempts.push(attempt);
            continue;
          }

          const data = await response.json();
          const items = normalizeBatch1Items(data);
          attempt.item_count = items.length;
          attempt.source_trace_grade_A_count = items.filter((item) => {
            const direct = item.source_trace_grade;
            const nested = item.source && item.source.source_trace_grade;
            return direct === 'A' || nested === 'A';
          }).length;
          attempt.human_review_required_false_count = items.filter((item) => {
            if (item.human_review_required === false) return true;
            return item.flags && item.flags.human_review_required === false;
          }).length;

          selected = attempt;
          state.batch1Data = items;
          attempts.push(attempt);
          break;
        } catch (error) {
          attempt.error = error.message;
          attempts.push(attempt);
        }
      }

      state.batch1FetchResult = { selected, attempts };
      report.batch1 = state.batch1FetchResult;
      return state.batch1FetchResult;
    }

    function buildRestoreRows(items) {
      const now = Date.now();
      return items.map((item, index) => {
        const sourceItemId = item.unit_id || item.id || item.topic || `HQI-BATCH1-${String(index + 1).padStart(3, '0')}`;
        const visualType = item.understanding_visual?.type || item.visual_type || 'none';
        const grade = item.source?.source_trace_grade || item.source_trace_grade || 'A';
        const reviewStatus = (item.flags?.human_review_required === false || item.human_review_required === false) ? 'auto_ok' : 'human_review_required';
        return {
          id: `HQI-BATCH1-${String(index + 1).padStart(3, '0')}`,
          source_item_id: sourceItemId,
          batch_id: BATCH_ID,
          origin: 'high_quality_input_unit_batch1',
          category: item.category,
          review_status: reviewStatus,
          source_trace_grade: grade,
          visual_type: visualType,
          disabled: false,
          created_at: now,
          updated_at: now
        };
      });
    }

    function validateBatch1Items(items) {
      const ids = [];
      let duplicateIdCount = 0;
      let missingRequiredFieldCount = 0;
      let validationFailed = 0;
      let sourceTraceGradeA = 0;
      let humanReviewRequiredFalse = 0;

      for (const [index, item] of items.entries()) {
        const id = item.unit_id || item.id || item.topic || `HQI-BATCH1-${String(index + 1).padStart(3, '0')}`;
        ids.push(id);

        const required = ['topic', 'category', 'source', 'content', 'flags'];
        const missing = required.filter((key) => item[key] === undefined || item[key] === null);
        if (missing.length > 0) {
          missingRequiredFieldCount += missing.length;
          validationFailed++;
          continue;
        }

        const sourceGrade = item.source?.source_trace_grade;
        const humanReview = item.flags?.human_review_required;
        if (sourceGrade !== 'A') {
          validationFailed++;
        } else {
          sourceTraceGradeA++;
        }
        if (humanReview !== false) {
          validationFailed++;
        } else {
          humanReviewRequiredFalse++;
        }
      }

      const uniqueCount = new Set(ids).size;
      duplicateIdCount = ids.length - uniqueCount;
      if (duplicateIdCount > 0) {
        validationFailed += duplicateIdCount;
      }

      if (items.length !== 20) {
        validationFailed++;
      }

      return {
        converted_units: items.length,
        validation_failed: validationFailed,
        duplicate_id_count: duplicateIdCount,
        missing_required_field_count: missingRequiredFieldCount,
        source_trace_grade_A: sourceTraceGradeA,
        human_review_required_false: humanReviewRequiredFalse
      };
    }

    async function runEnvironmentDiagnostics() {
      environmentBtn.disabled = true;
      setStatus(environmentStatus, 'running environment diagnostics', 'warn');

      const indexedDbInfo = await listIndexedDatabases();
      const dbSnapshot = await readDbSnapshot();

      state.indexedDbInfo = indexedDbInfo;
      state.databaseBefore = dbSnapshot;
      report.generated_at = new Date().toISOString();
      report.browser = {
        location_origin: location.origin,
        location_href: location.href,
        user_agent: navigator.userAgent
      };
      report.indexed_db = indexedDbInfo;
      report.database_before = dbSnapshot;

      clearNode(environmentSummary);
      addSummary(environmentSummary, 'location.origin', location.origin, 'ok');
      addSummary(environmentSummary, 'location.href', location.href, 'ok');
      addSummary(environmentSummary, 'indexedDB.databases()', JSON.stringify(indexedDbInfo.databases, null, 2), indexedDbInfo.error ? 'warn' : 'ok');
      addSummary(environmentSummary, 'dexie_db_name', dbSnapshot.dexie_db_name, dbSnapshot.dexie_db_name === CANONICAL_DB_NAME ? 'ok' : 'fail');
      addSummary(environmentSummary, 'dexie_version', dbSnapshot.dexie_version, dbSnapshot.dexie_version === EXPECTED_DEXIE_VERSION ? 'ok' : 'fail');
      addSummary(environmentSummary, 'stores_visible', dbSnapshot.stores_visible.join('\n'), 'ok');

      setStatus(environmentStatus, 'environment diagnostics complete', 'ok');
      environmentBtn.disabled = false;
      renderReport();
    }

    async function checkDatabase() {
      checkDbBtn.disabled = true;
      setStatus(dbStatus, 'reading database state', 'warn');

      const dbSnapshot = await readDbSnapshot();
      state.databaseBefore = dbSnapshot;
      report.database_before = dbSnapshot;

      clearNode(dbSummary);
      addSummary(dbSummary, 'source_questions_total', dbSnapshot.source_questions_total, 'ok');
      addSummary(dbSummary, 'source_choices_total', dbSnapshot.source_choices_total, 'ok');
      addSummary(dbSummary, 'source_questions_takken', dbSnapshot.source_questions_takken, 'ok');
      addSummary(dbSummary, 'source_choices_takken', dbSnapshot.source_choices_takken, 'ok');
      addSummary(dbSummary, 'source_questions_chintai', dbSnapshot.source_questions_chintai, 'ok');
      addSummary(dbSummary, 'source_choices_chintai', dbSnapshot.source_choices_chintai, 'ok');
      addSummary(dbSummary, 'high_quality_input_units_count_before', dbSnapshot.high_quality_input_units_count, 'ok');
      addSummary(dbSummary, 'question_explanations_count_before', dbSnapshot.question_explanations_count, 'ok');
      addSummary(dbSummary, 'choice_explanations_count_before', dbSnapshot.choice_explanations_count, 'ok');

      setStatus(dbStatus, 'database state captured', 'ok');
      checkDbBtn.disabled = false;
      renderReport();
    }

    async function loadBatch1Data() {
      loadBatch1Btn.disabled = true;
      setStatus(batch1Status, 'loading batch1 json', 'warn');
      const batch1 = await fetchBatch1();
      clearNode(batch1Summary);

      if (batch1.selected) {
        addSummary(batch1Summary, 'batch1_fetch_url', batch1.selected.url, 'ok');
        addSummary(batch1Summary, 'batch1_fetch_status', batch1.selected.status, batch1.selected.ok ? 'ok' : 'fail');
        addSummary(batch1Summary, 'batch1_item_count', batch1.selected.item_count, batch1.selected.item_count === 20 ? 'ok' : 'warn');
        addSummary(batch1Summary, 'source_trace_grade_A_count', batch1.selected.source_trace_grade_A_count, batch1.selected.source_trace_grade_A_count === 20 ? 'ok' : 'warn');
        addSummary(batch1Summary, 'human_review_required_false_count', batch1.selected.human_review_required_false_count, batch1.selected.human_review_required_false_count === 20 ? 'ok' : 'warn');
        setStatus(batch1Status, 'batch1 json loaded', 'ok');
      } else {
        setStatus(batch1Status, 'batch1 json not readable', 'fail');
      }

      loadBatch1Btn.disabled = false;
      renderReport();
    }

    async function runFormalImportDryRun() {
      dryRunBtn.disabled = true;
      setStatus(formalImportDryRunStatus, 'running formal import dry-run', 'warn');

      const items = state.batch1Data || [];
      const summary = validateBatch1Items(items);
      state.dryRunResult = {
        formal_import_dry_run_executed: true,
        dry_run_writes_db: false,
        ...summary
      };
      report.formal_import_dry_run = state.dryRunResult;

      clearNode(formalImportSummary);
      addSummary(formalImportSummary, 'formal_import_dry_run_executed', true, 'ok');
      addSummary(formalImportSummary, 'dry_run_writes_db', false, 'ok');
      addSummary(formalImportSummary, 'converted_units', summary.converted_units, summary.converted_units === 20 ? 'ok' : 'warn');
      addSummary(formalImportSummary, 'validation_failed', summary.validation_failed, summary.validation_failed === 0 ? 'ok' : 'warn');
      addSummary(formalImportSummary, 'duplicate_id_count', summary.duplicate_id_count, summary.duplicate_id_count === 0 ? 'ok' : 'warn');
      addSummary(formalImportSummary, 'missing_required_field_count', summary.missing_required_field_count, summary.missing_required_field_count === 0 ? 'ok' : 'warn');
      addSummary(formalImportSummary, 'source_trace_grade_A', summary.source_trace_grade_A, summary.source_trace_grade_A === 20 ? 'ok' : 'warn');
      addSummary(formalImportSummary, 'human_review_required_false', summary.human_review_required_false, summary.human_review_required_false === 20 ? 'ok' : 'warn');

      setStatus(formalImportDryRunStatus, 'formal import dry-run complete', 'ok');
      dryRunBtn.disabled = false;
      renderReport();
    }

    function updateApprovalState() {
      state.approvalCodeReceived = approvalCodeInput.value.trim() === APPROVAL_CODE;
      report.human_gate = {
        approval_code_required: APPROVAL_CODE,
        approval_code_received: state.approvalCodeReceived
      };
      formalRestoreBtn.disabled = !state.approvalCodeReceived;
      renderReport();
    }

    async function runFormalRestore() {
      if (!state.approvalCodeReceived) {
        setStatus(restoreStatus, 'approval code mismatch - restore blocked', 'fail');
        return;
      }

      const items = state.batch1Data || [];
      const dryRun = state.dryRunResult || validateBatch1Items(items);
      if (dryRun.validation_failed !== 0 || dryRun.converted_units !== 20 || dryRun.duplicate_id_count !== 0 || dryRun.missing_required_field_count !== 0 || dryRun.source_trace_grade_A !== 20 || dryRun.human_review_required_false !== 20) {
        setStatus(restoreStatus, 'dry-run gate failed - restore blocked', 'fail');
        return;
      }

      const beforeCount = await db.table('high_quality_input_units').count();
      const existingIds = [];
      for (const row of buildRestoreRows(items)) {
        if (await db.table('high_quality_input_units').get(row.id)) {
          existingIds.push(row.id);
        }
      }
      if (existingIds.length > 0) {
        setStatus(restoreStatus, `duplicate id collision: ${existingIds.join(', ')}`, 'fail');
        return;
      }

      const rows = buildRestoreRows(items);
      const now = Date.now();
      state.formalRestoreResult = {
        formal_import_executed: false,
        target_store: 'high_quality_input_units',
        batch_id: BATCH_ID,
        inserted_count: 0,
        failed_count: 0,
        duplicate_id_count: 0,
        touched_stores: ['high_quality_input_units']
      };

      try {
        await db.transaction('rw', db.high_quality_input_units, async () => {
          await db.high_quality_input_units.bulkAdd(rows.map((row) => ({
            id: row.id,
            source_item_id: row.source_item_id,
            batch_id: row.batch_id,
            origin: row.origin,
            category: row.category,
            review_status: row.review_status,
            source_trace_grade: row.source_trace_grade,
            visual_type: row.visual_type,
            disabled: row.disabled,
            created_at: now,
            updated_at: now
          })));
        });

        const afterCount = await db.table('high_quality_input_units').count();
        state.formalRestoreResult = {
          formal_import_executed: true,
          target_store: 'high_quality_input_units',
          batch_id: BATCH_ID,
          inserted_count: rows.length,
          failed_count: 0,
          duplicate_id_count: 0,
          touched_stores: ['high_quality_input_units'],
          before_count: beforeCount,
          after_count: afterCount
        };
        report.formal_restore = state.formalRestoreResult;
        setStatus(restoreStatus, 'formal restore complete', 'ok');

        clearNode(restoreSummary);
        addSummary(restoreSummary, 'formal_import_executed', true, 'ok');
        addSummary(restoreSummary, 'target_store', 'high_quality_input_units', 'ok');
        addSummary(restoreSummary, 'batch_id', BATCH_ID, 'ok');
        addSummary(restoreSummary, 'inserted_count', rows.length, rows.length === 20 ? 'ok' : 'warn');
        addSummary(restoreSummary, 'failed_count', 0, 'ok');
        addSummary(restoreSummary, 'duplicate_id_count', 0, 'ok');
        addSummary(restoreSummary, 'touched_stores', 'high_quality_input_units', 'ok');
      } catch (error) {
        state.formalRestoreResult = {
          formal_import_executed: false,
          target_store: 'high_quality_input_units',
          batch_id: BATCH_ID,
          inserted_count: 0,
          failed_count: 1,
          duplicate_id_count: 0,
          touched_stores: ['high_quality_input_units'],
          error: error.message
        };
        report.formal_restore = state.formalRestoreResult;
        setStatus(restoreStatus, `formal restore failed: ${error.message}`, 'fail');
      }

      renderReport();
    }

    async function checkDatabaseAfterRestore() {
      postDbBtn.disabled = true;
      setStatus(postDbStatus, 'reading database after restore', 'warn');
      const dbSnapshot = await readDbSnapshot();
      state.databaseAfter = dbSnapshot;
      report.database_after = dbSnapshot;

      clearNode(postDbSummary);
      addSummary(postDbSummary, 'high_quality_input_units_count_after', dbSnapshot.high_quality_input_units_count, dbSnapshot.high_quality_input_units_count === 20 ? 'ok' : 'warn');
      addSummary(postDbSummary, 'source_questions_total_after', dbSnapshot.source_questions_total, dbSnapshot.source_questions_total === 1524 ? 'ok' : 'warn');
      addSummary(postDbSummary, 'source_choices_total_after', dbSnapshot.source_choices_total, dbSnapshot.source_choices_total === 3024 ? 'ok' : 'warn');
      addSummary(postDbSummary, 'question_explanations_count_after', dbSnapshot.question_explanations_count, dbSnapshot.question_explanations_count === 0 ? 'ok' : 'warn');
      addSummary(postDbSummary, 'choice_explanations_count_after', dbSnapshot.choice_explanations_count, dbSnapshot.choice_explanations_count === 0 ? 'ok' : 'warn');

      setStatus(postDbStatus, 'post-restore database captured', 'ok');
      postDbBtn.disabled = false;
      renderReport();
    }

    async function runRollbackDryRunAfter() {
      rollbackBtn.disabled = true;
      setStatus(rollbackStatus, 'running rollback dry-run', 'warn');
      const hqi = db.table('high_quality_input_units');
      const items = await hqi.where('batch_id').equals(BATCH_ID).toArray();
      state.rollbackDryRunResult = {
        rollback_dry_run_executed: true,
        rollback_executed: false,
        rollback_target_count: items.length,
        high_quality_input_units_count_after_rollback_dry_run: await hqi.count()
      };
      report.rollback_dry_run_after = state.rollbackDryRunResult;

      clearNode(rollbackSummary);
      addSummary(rollbackSummary, 'rollback_dry_run_executed', true, 'ok');
      addSummary(rollbackSummary, 'rollback_executed', false, 'ok');
      addSummary(rollbackSummary, 'rollback_target_count', items.length, items.length === 20 ? 'ok' : 'warn');
      addSummary(rollbackSummary, 'high_quality_input_units_count_after_rollback_dry_run', state.rollbackDryRunResult.high_quality_input_units_count_after_rollback_dry_run, state.rollbackDryRunResult.high_quality_input_units_count_after_rollback_dry_run === 20 ? 'ok' : 'warn');

      setStatus(rollbackStatus, 'rollback dry-run complete', 'ok');
      rollbackBtn.disabled = false;
      renderReport();
    }

    function renderReport() {
      output.textContent = JSON.stringify(report, null, 2);
    }

    async function showReport() {
      renderReport();
    }

    async function copyReport() {
      await navigator.clipboard.writeText(JSON.stringify(report, null, 2));
    }

    environmentBtn.addEventListener('click', runEnvironmentDiagnostics);
    checkDbBtn.addEventListener('click', checkDatabase);
    loadBatch1Btn.addEventListener('click', loadBatch1Data);
    dryRunBtn.addEventListener('click', runFormalImportDryRun);
    rollbackBtn.addEventListener('click', runRollbackDryRunAfter);
    postDbBtn.addEventListener('click', checkDatabaseAfterRestore);
    showReportBtn.addEventListener('click', showReport);
    copyReportBtn.addEventListener('click', copyReport);
    approvalCodeInput.addEventListener('input', updateApprovalState);
    formalRestoreBtn.addEventListener('click', runFormalRestore);

    renderReport();
  </script>
</body>
</html>
