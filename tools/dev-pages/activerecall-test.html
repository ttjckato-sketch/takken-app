<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ActiveRecall Test - study_events確認</title>
  <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
  <style>
    body { font-family: 'Consolas', 'Monaco', monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h1 { color: #4ec9b0; }
    .step { background: #252526; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #4ec9b0; }
    .step h3 { margin-top: 0; color: #569cd6; }
    button { padding: 10px 20px; margin: 5px; font-size: 14px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 4px; }
    button:hover { background: #1177bb; }
    button:disabled { background: #3a3a3a; cursor: not-allowed; }
    pre { background: #1e1e1e; padding: 10px; border: 1px solid #3e3e3e; overflow-x: auto; }
    .result { margin-top: 20px; padding: 15px; background: #1e3a1e; border: 1px solid #4ec9b0; border-radius: 5px; }
    .error { background: #3a1e1e; border-color: #f48771; }
    .copy-btn { background: #3a3a3a; }
    .copy-btn:hover { background: #4a4a4a; }
  </style>
</head>
<body>
  <h1>🧪 ActiveRecall Test - study_events確認</h1>
  <div>
    <button onclick="copyReport()" class="copy-btn">📋 報告フォーマットをクリップボードにコピー</button>
    <button onclick="downloadResults()">💾 全結果をJSONダウンロード</button>
    <button onclick="openApp()">アプリを開く</button>
  </div>

  <div class="step">
    <h3>Step 1: 現在のstudy_events件数を確認</h3>
    <button onclick="checkBefore()">回答前のstudy_events件数を確認</button>
    <div id="before-result"></div>
  </div>

  <div class="step">
    <h3>Step 2: ActiveRecallで回答する</h3>
    <p>アプリ本体でActiveRecallを1問回答してください</p>
  </div>

  <div class="step">
    <h3>Step 3: 回答後のstudy_events件数を確認</h3>
    <button onclick="checkAfter()">回答後のstudy_events件数を確認</button>
    <div id="after-result"></div>
  </div>

  <div class="step">
    <h3>Step 4: 最新のstudy_event内容を確認</h3>
    <button onclick="checkLatestEvent()">最新のstudy_eventを表示</button>
    <div id="latest-event"></div>
  </div>

  <script>
    // DBスキーマ定義 - Must match src/db.ts version(24).stores
    const CURRENT_DB_VERSION = 25; // SSOT: src/db.ts TakkenOS_DB schema version
    const db = new Dexie('TakkenOS_DB');
    db.version(CURRENT_DB_VERSION).stores({
      limbs: 'id, parent_id, year, category_major, category_minor, *tags, importance, contrast_axis',
      progress: 'limb_id, due_at, state, last_review',
      comparisons: '++id, title',
      cases: 'id, title',
      stats: '++id, item',
      mnemonics: '++id, category, title',
      metadata: 'key',
      knowledge_cards: 'card_id, knowledge_domain.major, *knowledge_domain.tags, study_metadata.importance',
      knowledge_progress: 'card_id, mastered, next_review, last_review',
      understanding_cards: 'card_id, category, *tags, exam_type, srs_params.repetitions, srs_params.last_reviewed, srs_params.next_review_date',
      learning_sessions: 'id, mode, start_time',
      source_questions: 'id, exam_type, year, question_no, category, question_type',
      source_choices: 'id, question_id, option_no, text, is_exam_correct_option',
      study_events: 'event_id, card_id, exam_type, category, mode, answered_correct, created_at',
      knowledge_units: 'unit_id, source_card_id, exam_type, category, learning_type, importance, confidence',
      memory_cards: 'memory_card_id, unit_id, exam_type, category, card_type, confidence',
      chintai_clusters: 'cluster_id, official_category, *tags, variations_count, confidence',
      recovered_learning_assets: 'asset_id, source_id, source_type, exam_type, category, asset_type, confidence, usable_in_learning, created_at, quality_review_needed',
      quality_improvement_suggestions: 'suggestion_id, target_id, target_type, issue_type, confidence, requires_human_review, is_applied',
      study_sessions: 'session_id, date, started_at, session_variant',
      enhanced_explanations: 'explanation_id, source_id, exam_type, category, quality_score, usable_in_learning',
      improvement_candidates: 'candidate_id, card_id, category, issue_type, human_review_required'
    });

    let testResults = {
      timestamp: new Date().toISOString(),
      before_count: null,
      after_count: null,
      increased: null,
      latest_event: null
    };

    async function checkBefore() {
      try {
        const count = await db.study_events.count();
        testResults.before_count = count;

        const result = document.getElementById('before-result');
        result.innerHTML = `
          <div class="result">
            <strong>回答前のstudy_events件数:</strong> ${count}
          </div>
        `;

        console.log(`✅ 回答前: study_events = ${count}`);
      } catch (error) {
        console.error('❌ エラー:', error);
        document.getElementById('before-result').innerHTML = `
          <div class="result error">
            <strong>エラー:</strong> ${error.message}
          </div>
        `;
      }
    }

    function openApp() {
      window.open('http://127.0.0.1:5176/', '_blank');
    }

    async function checkAfter() {
      try {
        const count = await db.study_events.count();
        testResults.after_count = count;
        const increased = testResults.before_count !== null && count === (testResults.before_count + 1);
        testResults.increased = increased;

        const result = document.getElementById('after-result');
        result.innerHTML = `
          <div class="result ${increased ? '' : 'error'}">
            <strong>回答後のstudy_events件数:</strong> ${count}<br>
            <strong>増加分:</strong> ${count - (testResults.before_count || 0)}<br>
            <strong>判定:</strong> ${increased ? 'OK (正常に増加)' : 'NG (増加せずまたは異常)'}
          </div>
        `;

        console.log(`✅ 回答後: study_events = ${count} (増加分: ${count - (testResults.before_count || 0)})`);
      } catch (error) {
        console.error('❌ エラー:', error);
        document.getElementById('after-result').innerHTML = `
          <div class="result error">
            <strong>エラー:</strong> ${error.message}
          </div>
        `;
      }
    }

    async function checkLatestEvent() {
      try {
        const events = await db.study_events
          .orderBy('created_at')
          .reverse()
          .limit(1)
          .toArray();

        if (events.length === 0) {
          document.getElementById('latest-event').innerHTML = `
            <div class="result">
              <strong>study_eventsが空です</strong>
            </div>
          `;
          return;
        }

        const event = events[0];
        testResults.latest_event = event;

        const result = document.getElementById('latest-event');
        result.innerHTML = `
          <div class="result">
            <strong>最新のstudy_event:</strong><br>
            <pre>${JSON.stringify(event, null, 2)}</pre>
          </div>
        `;

        console.log('✅ 最新のstudy_event:', event);
      } catch (error) {
        console.error('❌ エラー:', error);
        document.getElementById('latest-event').innerHTML = `
          <div class="result error">
            <strong>エラー:</strong> ${error.message}
          </div>
        `;
      }
    }

    function downloadResults() {
      const blob = new Blob([JSON.stringify(testResults, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `activerecall-test-result-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert('✅ JSONファイルをダウンロードしました');
    }

    function copyReport() {
      const latestEvent = testResults.latest_event;
      const hasLatestEvent = latestEvent && latestEvent.correct_answer !== undefined && latestEvent.correct_answer !== null;

      const reportText = `【ActiveRecall イベント確認】
回答前 study_events: ${testResults.before_count !== null ? testResults.before_count : '未確認'}
回答後 study_events: ${testResults.after_count !== null ? testResults.after_count : '未確認'}
増加判定: ${testResults.increased !== null ? (testResults.increased ? 'OK' : 'NG') : '未確認'}

【最新 study_event JSON】${latestEvent ? '\n' + JSON.stringify(latestEvent, null, 2) : '\nまだstudy_eventがありません'}`;

      navigator.clipboard.writeText(reportText).then(() => {
        alert('✅ 報告フォーマットをクリップボードにコピーしました');
      }).catch(err => {
        console.error('コピー失敗:', err);
        alert('❌ コピーに失敗しました');
      });
    }

    // 初期化時に現在の件数を表示
    window.addEventListener('load', async () => {
      try {
        const count = await db.study_events.count();
        console.log(`📊 現在のstudy_events件数: ${count}`);
      } catch (error) {
        console.error('❌ 初期化エラー:', error);
      }
    });
  </script>
</body>
</html>
