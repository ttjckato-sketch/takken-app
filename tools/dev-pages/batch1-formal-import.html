    // Rollback Dry-run Helper
    async function rollbackHighQualityInputUnitsBatchDryRun(batchId) {
      const hqiStore = db.table('high_quality_input_units');
      const beforeCount = await hqiStore.count();
      const itemsToDelete = await hqiStore.where('batch_id').equals(batchId).toArray();

      return {
        ok: true,
        mode: 'dry_run',
        batch_id: batchId,
        expected_count: itemsToDelete.length,
        deleted_count: itemsToDelete.length,
        before_count: beforeCount,
        after_count: beforeCount,
        touched_stores: ['high_quality_input_units']
      };
    }

    // Formal Import Dry-run Helper
    async function importHighQualityInputUnitsBatch1DryRun(data) {
      const hqiStore = db.table('high_quality_input_units');
      const beforeCount = await hqiStore.count();

      // 重複チェック
      const existingIds = new Set();
      for (const item of data) {
        const existing = await hqiStore.get(item.unit_id);
        if (existing) existingIds.add(item.unit_id);
      }

      if (existingIds.size > 0) {
        return {
          ok: false,
          mode: 'dry_run',
          batch_id: 'batch1',
          expected_count: data.length,
          inserted_count: 0,
          before_count: beforeCount,
          after_count: beforeCount,
          errors: [`Duplicate IDs: ${Array.from(existingIds).join(', ')}`],
          touched_stores: ['high_quality_input_units']
        };
      }

      // バリデーション
      const nonGradeAItems = data.filter(item => {
        const sourceTrace = item.source_trace || [];
        return !sourceTrace.some(st => st.confidence === 'high');
      });

      if (nonGradeAItems.length > 0) {
        return {
          ok: false,
          mode: 'dry_run',
          batch_id: 'batch1',
          expected_count: data.length,
          inserted_count: 0,
          before_count: beforeCount,
          after_count: beforeCount,
          errors: [`${nonGradeAItems.length} items do not have source_trace_grade A`],
          touched_stores: ['high_quality_input_units']
        };
      }

      return {
        ok: true,
        mode: 'dry_run',
        batch_id: 'batch1',
        expected_count: data.length,
        inserted_count: data.length,
        before_count: beforeCount,
        after_count: beforeCount,
        errors: [],
        touched_stores: ['high_quality_input_units']
      };
    }

        await db.transaction('rw', hqiStore, async () => {
          for (const item of data) {
            await hqiStore.add({
              id: item.unit_id,
              source_item_id: item.unit_id,
              batch_id: 'batch1',
              origin: 'high_quality_input_unit_batch1',
              category: item.category,
              review_status: 'auto_ok',
              source_trace_grade: 'A',
              visual_type: item.understanding_visual.type || 'none',
              disabled: false,
              created_at: Date.now(),
              updated_at: Date.now()
            });
            inserted.push(item.unit_id);
          }
        });

        const afterCount = await hqiStore.count();

        return {
          ok: true,
          mode: 'formal_import',
          batch_id: 'batch1',
          expected_count: data.length,
          inserted_count: inserted.length,
          before_count: beforeCount,
          after_count: afterCount,
          errors: [],
          touched_stores: ['high_quality_input_units']
        };
      } catch (error) {
        return {
          ok: false,
          mode: 'formal_import',
          batch_id: 'batch1',
          expected_count: data.length,
          inserted_count: 0,
          before_count: beforeCount,
          after_count: beforeCount,
          errors: [error.message],
          touched_stores: ['high_quality_input_units']
        };
      }
    }

    // 7. レポート出力
    function exportReport() {
      const report = {
        execution_date: new Date().toISOString(),
        pre_db_status: reportData.preDBStatus,
        rollback_dry_run_before: reportData.rollbackDryRunBefore,
        formal_import_dry_run: reportData.formalImportDryRun,
        formal_import_result: reportData.formalImportResult,
        post_db_status: reportData.postDBStatus,
        rollback_dry_run_after: reportData.rollbackDryRunAfter
      };

      const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `batch1_formal_import_result_${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);

      const output = document.getElementById('output');
      const div = document.createElement('div');
      div.className = 'result pass';
      div.textContent = '✅ レポートを出力しました';
      output.appendChild(div);
    }
  </script>
</body>
